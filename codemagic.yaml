workflows:
  android-release:
    name: KoinToko - Build AAB + APK
    max_build_duration: 60
    environment:
      android_signing:
        - kointoko_keystore
      vars:
        PACKAGE_NAME: "id.kointoko.app"
      java: 17

    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Build AAB dan APK sekaligus
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - bayanggara6@gmail.com
        notify:
          success: true
          failure: true
